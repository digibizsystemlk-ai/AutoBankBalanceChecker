name: Flutter Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # GitHub එකට ආපහු ලියන්න අවසර දෙනවා

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Create Android Platform
        run: flutter create --platforms android --project-name auto_bank_balance .

      - name: Update Android SDK Versions
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/flutter.compileSdkVersion/34/g' android/app/build.gradle.kts
            sed -i 's/flutter.targetSdkVersion/34/g' android/app/build.gradle.kts
            sed -i 's/flutter.minSdkVersion/21/g' android/app/build.gradle.kts
          elif [ -f android/app/build.gradle ]; then
            sed -i 's/flutter.compileSdkVersion/34/g' android/app/build.gradle
            sed -i 's/flutter.targetSdkVersion/34/g' android/app/build.gradle
            sed -i 's/flutter.minSdkVersion/21/g' android/app/build.gradle
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Commit and Push Android Folder & APK back to Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add android/
          git add -f build/app/outputs/flutter-apk/app-release.apk  # gitignore එක බයිපාස් කරලා බලෙන්ම ඇඩ් කරනවා
          git commit -m "Automated commit: Added android folder and release APK from Cloud Build" || exit 0
          git push origin main