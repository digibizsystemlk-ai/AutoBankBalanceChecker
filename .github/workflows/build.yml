name: Build Flutter APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Create Android Platform
        run: flutter create --platforms android .

      - name: Update Android SDK Versions
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/compileSdk = .*/compileSdk = 36/g' android/app/build.gradle.kts
            sed -i 's/targetSdk = .*/targetSdk = 34/g' android/app/build.gradle.kts
          elif [ -f android/app/build.gradle ]; then
            sed -i 's/compileSdkVersion .*/compileSdkVersion 36/g' android/app/build.gradle
            sed -i 's/targetSdkVersion .*/targetSdkVersion 34/g' android/app/build.gradle
          fi

      - name: Generate App Icon
        run: flutter pub run flutter_launcher_icons

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoBankBalanceChecker-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
