name: Flutter Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Create Android Platform
        run: flutter create --platforms android .

      - name: Update Android SDK Versions
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/flutter.compileSdkVersion/34/g' android/app/build.gradle.kts
            sed -i 's/flutter.targetSdkVersion/34/g' android/app/build.gradle.kts
            sed -i 's/flutter.minSdkVersion/21/g' android/app/build.gradle.kts
          elif [ -f android/app/build.gradle ]; then
            sed -i 's/flutter.compileSdkVersion/34/g' android/app/build.gradle
            sed -i 's/flutter.targetSdkVersion/34/g' android/app/build.gradle
            sed -i 's/flutter.minSdkVersion/21/g' android/app/build.gradle
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release