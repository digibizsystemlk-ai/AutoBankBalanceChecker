name: Flutter Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Create Android Platform
        run: flutter create --platforms android --project-name auto_bank_balance .

      - name: Update Android SDK Versions
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/flutter.compileSdkVersion/34/g' android/app/build.gradle.kts
            sed -i 's/flutter.targetSdkVersion/34/g' android/app/build.gradle.kts
            sed -i 's/flutter.minSdkVersion/21/g' android/app/build.gradle.kts
          elif [ -f android/app/build.gradle ]; then
            sed -i 's/flutter.compileSdkVersion/34/g' android/app/build.gradle
            sed -i 's/flutter.targetSdkVersion/34/g' android/app/build.gradle
            sed -i 's/flutter.minSdkVersion/21/g' android/app/build.gradle
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Commit and Push Android Folder & APK back to Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # APK එක build ෆෝල්ඩරයෙන් එළියට කොපි කරනවා
          cp build/app/outputs/flutter-apk/app-release.apk ./app-release.apk
          
          # Git එකට ෆයිල් එකතු කරනවා (Warn ආවත් බිල්ඩ් එක නවතින්නේ නැති වෙන්න සකස් කර ඇත)
          git add android/ || true
          git add -f app-release.apk || true
          
          git commit -m "Automated commit: Added android folder and release APK to root" || exit 0
          git push origin main